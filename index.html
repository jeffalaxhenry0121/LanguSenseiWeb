<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LanguSensei 개인정보처리방침</title>
  <style>
    :root {
      --bg-start: #eef3ff;
      --bg-end: #f7fbff;
      --text-main: #0f172a;
      --text-sub: #475569;
      --card-border: #dbe5ff;
      --card-bg: rgba(255, 255, 255, 0.88);
      --brand: #3b82f6;
      --brand-dark: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      color: var(--text-main);
      background: radial-gradient(circle at 20% 20%, #dbeafe 0%, transparent 34%),
        linear-gradient(135deg, var(--bg-start), var(--bg-end));
    }

    .container {
      width: min(760px, 100%);
    }

    .card {
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 34px;
      background: var(--card-bg);
      box-shadow: 0 22px 40px rgba(37, 99, 235, 0.12);
      backdrop-filter: blur(6px);
    }

    .badge {
      display: inline-block;
      margin-bottom: 14px;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--brand-dark);
      background: #dbeafe;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.75rem, 2.6vw, 2.2rem);
      line-height: 1.2;
    }

    .description {
      margin: 12px 0 0;
      color: var(--text-sub);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 12px 18px;
      min-width: 132px;
      color: var(--brand-dark);
      background: #eff6ff;
      font-weight: 700;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }

    a.button:hover {
      transform: translateY(-1px);
      background: #dbeafe;
      box-shadow: 0 8px 14px rgba(30, 64, 175, 0.16);
    }

    a.button:active {
      transform: translateY(0);
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.9rem;
      color: #64748b;
    }

    @media (max-width: 520px) {
      .card {
        padding: 24px 20px;
        border-radius: 16px;
      }

      .links {
        flex-direction: column;
      }

      a.button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="card">
      <span class="badge">LANGUSENSEI</span>
      <h1>LanguSensei Privacy Policy</h1>
      <p class="description">개인정보처리방침 언어를 선택해주세요.</p>
      <p class="description">Please choose your language.</p>
      <div class="links">
        <a class="button" href="./privacy-ko.html">한국어</a>
        <a class="button" href="./privacy-en.html">English</a>
      </div>
      <p class="footer-note">Your privacy matters. We keep this policy transparent and easy to read.</p>
    </section>
  </main>
</body>

</html>
